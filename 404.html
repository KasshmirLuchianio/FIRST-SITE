<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Kashmir Luchiano</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'SuperstarM54';
      src: url('assets/SuperstarM54.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050a14;
      color: #c0c8d8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      padding: 40px;
    }
    .code {
      font-family: 'SuperstarM54', 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 15vw, 10rem);
      color: #f0f4ff;
      letter-spacing: 10px;
      line-height: 1;
      margin-bottom: 16px;
    }
    .message {
      font-size: 1.1rem;
      color: #8aa2c8;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .back-link {
      display: inline-block;
      color: #c0c8d8;
      text-decoration: none;
      font-family: 'SuperstarM54', 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 3px;
      padding: 14px 32px;
      border: 1px solid rgba(192, 200, 216, 0.2);
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    .back-link:hover {
      color: #fff;
      border-color: rgba(192, 200, 216, 0.5);
      background: rgba(255,255,255,0.03);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <p class="message">Pagina nu exista. Ai ajuns intr-un loc gresit.</p>
    <a href="/" class="back-link">INAPOI PE SITE</a>
  </div>
</body>
</html>
